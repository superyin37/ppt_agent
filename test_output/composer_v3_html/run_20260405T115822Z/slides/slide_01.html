<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #2C3E2D;
  --color-secondary:      #5A7A6B;
  --color-accent:         #C47D3E;
  --color-bg:             #F4F2EE;
  --color-surface:        #EAE7E1;
  --color-text-primary:   #1E2A1F;
  --color-text-secondary: #6B7C6D;
  --color-border:         #D1CCC4;
  --color-overlay:        rgba(44,62,45,0.72);
  --color-cover-bg:       linear-gradient(155deg, #1E2A1F 0%, #2C3E2D 40%, #3D5A44 100%);

  /* ── 字体系统 ── */
  --font-heading: "方正兰亭黑", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "DM Sans", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 51px;
  --text-h1:      38px;
  --text-h2:      28px;
  --text-h3:      21px;
  --text-body:    16px;
  --text-caption: 12px;
  --text-label:   9px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.75;
  --line-height-heading: 1.25;
  --letter-spacing-label:0.08em;

  /* ── 空间系统 ── */
  --safe-margin:   64px;
  --section-gap:   48px;
  --element-gap:   20px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 4px;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>

mark.br{bottom:60px;right:60px}</style><div class="cover-bg"></div><div class="grain-overlay"></div><svg class="geo-lines" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="540" x2="1920" y2="540" stroke="rgba(255,255,255,0.03)" stroke-width="1"/><line x1="960" y1="0" x2="960" y2="1080" stroke="rgba(255,255,255,0.03)" stroke-width="1"/><circle cx="960" cy="540" r="320" stroke="rgba(255,255,255,0.04)" stroke-width="0.8" fill="none"/><circle cx="960" cy="540" r="420" stroke="rgba(255,255,255,0.025)" stroke-width="0.5" fill="none"/><path d="M 760 340 Q 960 280 1160 340" stroke="var(--color-accent,#c1694f)" stroke-width="0.6" fill="none" opacity="0.15"/><path d="M 800 380 Q 960 330 1120 380" stroke="var(--color-accent,#c1694f)" stroke-width="0.4" fill="none" opacity="0.1"/><line x1="80" y1="120" x2="80" y2="200" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/><line x1="60" y1="140" x2="100" y2="140" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/><line x1="1840" y1="880" x2="1840" y2="960" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/><line x1="1820" y1="940" x2="1860" y2="940" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/><rect x="1750" y="80" width="90" height="90" stroke="rgba(255,255,255,0.03)" stroke-width="0.5" fill="none" rx="2"/><polygon points="160,950 175,980 145,980" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" fill="none"/></svg><div class="content-layer"><div class="en-subtitle">Shiyan · Zhangwan District · People's Square</div><div style="height:24px"></div><div class="title-block"><h1 class="main-title">十堰市张湾区人民广场<br>公共厕所建筑方案汇报</h1><div class="divider-line"></div><div class="concept-tag"><span>车城工业美学</span><span class="dot"></span><span>武当山水意象</span></div></div></div><div class="bottom-bar"><span>Material Package E2E</span><span style="font-family:var(--font-en);letter-spacing:.15em;font-size:12px;color:rgba(255,255,255,.25)">ARCHITECTURAL DESIGN PROPOSAL</span><span>2025</span></div></div>
