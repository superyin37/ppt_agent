<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #1C3A5F;
  --color-secondary:      #2D6A8F;
  --color-accent:         #E8A020;
  --color-bg:             #F8F6F1;
  --color-surface:        #EDEAE3;
  --color-text-primary:   #1C1C1C;
  --color-text-secondary: #6B6B6B;
  --color-border:         #D4D0C8;
  --color-overlay:        rgba(0,0,0,0.55);
  --color-cover-bg:       linear-gradient(135deg, #1C3A5F 0%, #2D6A8F 100%);

  /* ── 字体系统 ── */
  --font-heading: "思源黑体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "Inter", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 56px;
  --text-h1:      40px;
  --text-h2:      32px;
  --text-h3:      25px;
  --text-body:    20px;
  --text-caption: 16px;
  --text-label:   13px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.6;
  --line-height-heading: 1.15;
  --letter-spacing-label:0.08em;

  /* ── 空间系统 ── */
  --safe-margin:   80px;
  --section-gap:   48px;
  --element-gap:   24px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 4px;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>
<body>
<div class="slide-root" style="padding:var(--safe-margin);display:flex;flex-direction:column;justify-content:center;">
  <h2 style="font-family:var(--font-heading);font-size:var(--text-h1);color:var(--color-text-primary);margin-bottom:var(--section-gap);">概念方案人视图 1/3</h2>
  <p style="font-family:var(--font-body);font-size:var(--text-body);color:var(--color-text-primary);line-height:var(--line-height-body);">[Material Package E2E cultural] 调用 Nanobanana 生成室外人视图和室内人视图各一张（共两张）。要求：精致建筑摄影风格，光影真实，构图美感强。图片旁添加设计亮点注释（2~3 条，每条≤25字）。</p>
</div>

<div style="position:absolute;bottom:20px;left:var(--safe-margin);right:var(--safe-margin);
display:flex;justify-content:space-between;font-size:var(--text-caption);
color:var(--color-text-secondary);opacity:0.6;">
  <span>Material Package E2E Cultural 设计建议书</span>
  <span>36 / 41</span>
</div>
</body>
</html>
