<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #2C3E2D;
  --color-secondary:      #6B7B6E;
  --color-accent:         #C8875A;
  --color-bg:             #F4F2EE;
  --color-surface:        #EAE7E1;
  --color-text-primary:   #1E2A1F;
  --color-text-secondary: #5F6B60;
  --color-border:         #D1CCC4;
  --color-overlay:        rgba(44,62,45,0.72);
  --color-cover-bg:       linear-gradient(155deg, #1E2A1F 0%, #3A4F3B 48%, #5A6E5B 100%);

  /* ── 字体系统 ── */
  --font-heading: "方正兰亭黑", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "DM Sans", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 51px;
  --text-h1:      38px;
  --text-h2:      28px;
  --text-h3:      21px;
  --text-body:    16px;
  --text-caption: 12px;
  --text-label:   9px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.75;
  --line-height-heading: 1.25;
  --letter-spacing-label:0.08em;

  /* ── 空间系统 ── */
  --safe-margin:   64px;
  --section-gap:   48px;
  --element-gap:   20px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 4px;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>
<body>
<div class="slide-root"><style>.slide-root{background:var(--color-bg);font-family:var(--font-body);}.s38-header{position:absolute;top:48px;left:var(--safe-margin);display:flex;align-items:center;gap:16px;z-index:10;}.s38-tag{background:var(--color-primary);color:#fff;font-family:var(--font-heading);font-size:var(--text-label);padding:6px 18px;border-radius:var(--border-radius);letter-spacing:2px;}.s38-title{font-family:var(--font-heading);font-size:var(--text-h2);color:var(--color-text-primary);font-weight:700;letter-spacing:3px;}.s38-subtitle{font-family:var(--font-en);font-size:var(--text-caption);color:var(--color-text-secondary);margin-left:8px;letter-spacing:1px;text-transform:uppercase;}.s38-grid{position:absolute;top:130px;left:var(--safe-margin);right:var(--safe-margin);bottom:60px;display:grid;grid-template-columns:1fr 1fr;gap:32px;}.s38-card{position:relative;border-radius:var(--border-radius);overflow:hidden;background:var(--color-surface);box-shadow:0 2px 16px rgba(0,0,0,0.06);display:flex;flex-direction:column;}.s38-img-area{flex:1;position:relative;background:linear-gradient(135deg,var(--color-primary) 0%,rgba(0,0,0,0.15) 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0;}.s38-img-area svg{opacity:0.18;}.s38-placeholder-icon{width:120px;height:120px;}.s38-num{position:absolute;top:20px;left:24px;font-family:var(--font-en);font-size:64px;font-weight:800;color:rgba(255,255,255,0.12);line-height:1;letter-spacing:-2px;}.s38-label-bar{position:absolute;bottom:0;left:0;right:0;padding:14px 24px;background:linear-gradient(0deg,rgba(0,0,0,0.55) 0%,transparent 100%);display:flex;align-items:center;gap:10px;}.s38-label-dot{width:8px;height:8px;border-radius:50%;background:var(--color-accent);flex-shrink:0;}.s38-label-text{font-family:var(--font-heading);font-size:var(--text-body);color:#fff;font-weight:600;letter-spacing:1px;}.s38-note{padding:18px 24px;border-top:1px solid var(--color-border);}.s38-note p{font-size:var(--text-caption);color:var(--color-text-secondary);line-height:1.75;margin:0;}.s38-note strong{color:var(--color-text-primary);font-weight:600;}.s38-deco-arc{position:absolute;bottom:0;right:0;z-index:0;pointer-events:none;}.s38-footer{position:absolute;bottom:18px;left:var(--safe-margin);right:var(--safe-margin);display:flex;justify-content:space-between;align-items:center;}.s38-footer span{font-size:var(--text-label);color:var(--color-text-secondary);font-family:var(--font-en);letter-spacing:1px;}</style><div class="s38-header"><span class="s38-tag">方案三</span><span class="s38-title">云廊织城 · 人视效果</span><span class="s38-subtitle">Pedestrian Perspective</span></div><div class="s38-grid"><div class="s38-card"><div class="s38-img-area"><span class="s38-num">01</span><svg class="s38-placeholder-icon" viewBox="0 0 120 120" fill="none"><rect x="10" y="40" width="100" height="70" rx="6" stroke="#fff" stroke-width="2"/><polygon points="30,110 55,65 75,90 90,70 110,110" stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,0.08)"/><circle cx="85" cy="55" r="10" stroke="#fff" stroke-width="1.5"/><line x1="10" y1="35" x2="25" y2="10" stroke="#fff" stroke-width="1.2"/><line x1="110" y1="35" x2="95" y2="10" stroke="#fff" stroke-width="1.2"/><line x1="25" y1="10" x2="95" y2="10" stroke="#fff" stroke-width="1.2"/></svg><div class="s38-label-bar"><span class="s38-label-dot"></span><span class="s38-label-text">廊架下行人视角 · 日景</span></div></div><div class="s38-note"><p><strong>开放共享空间氛围：</strong>连续云廊覆盖步行动线，形成半室外灰空间；木纹格栅与绿植交织，光影随时间流转，为市民提供遮阳避雨的舒适慢行体验，激发驻足、交流与休憩行为。</p></div></div><div class="s38-card"><div class="s38-img-area" style="background:linear-gradient(135deg,#1a2a30 0%,#2d3e36 60%,var(--color-primary) 100%);"><span class="s38-num">02</span><svg class="s38-placeholder-icon" viewBox="0 0 120 120" fill="none"><rect x="10" y="40" width="100" height="70" rx="6" stroke="rgba(255,255,200,0.7)" stroke-width="2"/><circle cx="60" cy="25" r="14" stroke="rgba(255,255,200,0.5)" stroke-width="1.5" fill="rgba(255,255,200,0.05)"/><line x1="20" y1="110" x2="20" y2="55" stroke="rgba(255,255,200,0.4)" stroke-width="1"/><line x1="50" y1="110" x2="50" y2="55" stroke="rgba(255,255,200,0.4)" stroke-width="1"/><line x1="80" y1="110" x2="80" y2="55" stroke="rgba(255,255,200,0.4)" stroke-width="1"/><ellipse cx="60" cy="108" rx="45" ry="6" fill="rgba(255,255,200,0.06)"/></svg><div class="s38-label-bar"><span class="s38-label-dot" style="background:#f0c866;"></span><span class="s38-label-text">夜景灯光与城市家具化效果</span></div></div><div class="s38-note"><p><strong>夜景灯光与城市家具：</strong>暖色线性灯带嵌入廊架结构，勾勒云廊轮廓；地面洗墙灯营造柔和氛围，定制座椅、导视牌与花池一体化设计，将基础设施转化为城市家具，塑造十堰夜间文化客厅。</p></div></div></div><svg class="s38-deco-arc" width="320" height="320" viewBox="0 0 320 320"><circle cx="320" cy="320" r="280" fill="none" stroke="var(--color-primary)" stroke-width="1.5" opacity="0.1"/><circle cx="320" cy="320" r="220" fill="none" stroke="var(--color-accent)" stroke-width="1" opacity="0.08"/><circle cx="320" cy="320" r="160" fill="none" stroke="var(--color-primary)" stroke-width="0.8" opacity="0.06"/></svg><div class="s38-footer"><span>CONCEPT SCHEME III</span><span>38 / 50</span></div></div>
