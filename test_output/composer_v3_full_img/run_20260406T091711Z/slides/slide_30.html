<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #2C3E2D;
  --color-secondary:      #6B7B6E;
  --color-accent:         #C8875A;
  --color-bg:             #F4F2EE;
  --color-surface:        #EAE7E1;
  --color-text-primary:   #1E2A1F;
  --color-text-secondary: #5F6B60;
  --color-border:         #D1CCC4;
  --color-overlay:        rgba(44,62,45,0.72);
  --color-cover-bg:       linear-gradient(155deg, #1E2A1F 0%, #3A4F3B 48%, #5A6E5B 100%);

  /* ── 字体系统 ── */
  --font-heading: "方正兰亭黑", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "DM Sans", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 51px;
  --text-h1:      38px;
  --text-h2:      28px;
  --text-h3:      21px;
  --text-body:    16px;
  --text-caption: 12px;
  --text-label:   9px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.75;
  --line-height-heading: 1.25;
  --letter-spacing-label:0.08em;

  /* ── 空间系统 ── */
  --safe-margin:   64px;
  --section-gap:   48px;
  --element-gap:   20px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 4px;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>

ss="sr-title">钢城折岳</h1><p class="sr-sub">Steel Ridge Pavilion</p><div class="sr-divider"></div><p class="sr-desc">方案以十堰车城钢构折板为核心造型语言，屋面折线提取武当山脊天际轮廓，将工业力量感与山水韵律融为一体。大跨度钢结构折板屋面自东向西起伏延展，形成连续的山形剪影，既回应场地远山背景，又彰显城市工业基因。空间组织沿折板脊线展开，展览、演艺、文创三大功能体量依山势错落嵌套，形成内外贯通的流动空间序列。</p><div class="sr-keywords"><span class="sr-kw">钢构折板</span><span class="sr-kw">山脊轮廓</span><span class="sr-kw">工业力量</span><span class="sr-kw">空间错落</span><span class="sr-kw">山水韵律</span></div></div><div class="sr-right"><div class="sr-sketch-bg"></div><svg class="sr-mountain-svg" viewBox="0 0 960 1080" preserveAspectRatio="none"><defs><linearGradient id="mgrd" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--color-primary)" stop-opacity="0.08"/><stop offset="100%" stop-color="var(--color-primary)" stop-opacity="0.25"/></linearGradient></defs><polygon points="0,680 120,420 220,520 360,280 480,380 560,220 680,340 780,180 880,300 960,260 960,1080 0,1080" fill="url(#mgrd)"/><polyline points="0,680 120,420 220,520 360,280 480,380 560,220 680,340 780,180 880,300 960,260" fill="none" stroke="var(--color-primary)" stroke-width="3" stroke-linejoin="bevel"/><polyline points="0,750 160,500 300,580 440,360 580,460 700,310 820,420 960,350" fill="none" stroke="var(--color-accent)" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/></svg><svg class="sr-fold-line" viewBox="0 0 340 340"><polyline points="0,280 60,120 130,200 190,60 250,160 310,20 340,80" fill="none" stroke="var(--color-accent)" stroke-width="2.5" stroke-linejoin="bevel"/><polyline points="0,300 60,160 130,230 190,100 250,190 310,60 340,110" fill="none" stroke="var(--color-primary)" stroke-width="1" stroke-dasharray="4,4"/><circle cx="190" cy="60" r="4" fill="var(--color-accent)"/><circle cx="310" cy="20" r="3" fill="var(--color-accent)"/></svg></div><div class="sr-accent-bar"></div><svg class="sr-corner-deco" width="48" height="48" viewBox="0 0 48 48"><rect x="0" y="0" width="48" height="2" fill="var(--color-accent)" opacity="0.4"/><rect x="
