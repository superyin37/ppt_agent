<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #2C3E2D;
  --color-secondary:      #6B7B6E;
  --color-accent:         #C8875A;
  --color-bg:             #F4F2EE;
  --color-surface:        #EAE7E1;
  --color-text-primary:   #1E2A1F;
  --color-text-secondary: #5F6B60;
  --color-border:         #D1CCC4;
  --color-overlay:        rgba(44,62,45,0.72);
  --color-cover-bg:       linear-gradient(155deg, #1E2A1F 0%, #3A4F3B 48%, #5A6E5B 100%);

  /* ── 字体系统 ── */
  --font-heading: "方正兰亭黑", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "DM Sans", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 51px;
  --text-h1:      38px;
  --text-h2:      28px;
  --text-h3:      21px;
  --text-body:    16px;
  --text-caption: 12px;
  --text-label:   9px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.75;
  --line-height-heading: 1.25;
  --letter-spacing-label:0.08em;

  /* ── 空间系统 ── */
  --safe-margin:   64px;
  --section-gap:   48px;
  --element-gap:   20px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 4px;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>

olor-text-primary);line-height:1.65;}.s11-ins-text strong{color:var(--color-primary);font-weight:700;}.s11-divider{width:1px;height:56px;background:var(--color-border);flex-shrink:0;}.s11-deco-arc{position:absolute;top:-60px;right:-60px;width:320px;height:320px;z-index:1;opacity:.06;}</style><div class="s11-header"><span class="s11-sec-label">Background Research</span><span class="s11-title">产业结构分析</span></div><div class="s11-accent-line"></div><svg class="s11-deco-arc" viewBox="0 0 320 320"><circle cx="320" cy="0" r="280" fill="none" stroke="var(--color-primary)" stroke-width="1.5"/><circle cx="320" cy="0" r="220" fill="none" stroke="var(--color-primary)" stroke-width="1"/><circle cx="320" cy="0" r="160" fill="none" stroke="var(--color-primary)" stroke-width=".6"/></svg><div class="s11-grid"><div class="s11-card"><div class="s11-card-head"><span class="s11-card-dot"></span><span class="s11-card-label">产业发展趋势</span></div><div class="s11-card-img"><img src="file:///D:/projects/PPT_Agent/test_material/project1/%E7%BB%8F%E6%B5%8E%E8%83%8C%E6%99%AF%20-%20%E4%BA%A7%E4%B8%9A%E5%8F%91%E5%B1%95_chart_0_285.svg" alt="产业发展趋势图"></div></div><div class="s11-card"><div class="s11-card-head"><span class="s11-card-dot acc"></span><span class="s11-card-label">三产结构变化</span></div><div class="s11-card-img"><img src="file:///D:/projects/PPT_Agent/test_material/project1/%E7%BB%8F%E6%B5%8E%E8%83%8C%E6%99%AF%20-%20%E4%BA%A7%E4%B8%9A%E5%8F%91%E5%B1%95_chart_1_285.svg" alt="三产结构变化图"></div></div><div class="s11-card"><div class="s11-card-head"><span class="s11-card-dot sec"></span><span class="s11-card-label">GDP 总量与增速</span></div><div class="s11-card-img"><img src="file:///D:/projects/PPT_Agent/test_material/project1/%E7%BB%8F%E6%B5%8E%E8%83%8C%E6%99%AF%20-%20%E5%9F%8E%E5%B8%82%E7%BB%8F%E6%B5%8E_chart_0_285.svg" alt="GDP总量与增速图"></div></div><div class="s11-card"><div class="s11-card-head"><span class="s11-card-dot"></span><span class="s11-card-label">城市经济对比</span></div><div class="s11-card-img"><img src="file:///D:/projects/PPT_Agent/test_material/project1/%E7%BB%8F%E6%B5%8E%E8%83%8C%E6%99%AF%20-%20%E5%9F%8E%E5%B8%82%E7%BB%8F%E6%B5%8E_chart_1_285.svg" alt="城市经济对比图"></div></div></div><div class="s11-footer"><div class="s11-insight"><div class="s11-ins-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" fill="var(--color-primary)" opacity=".25"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="var(--color-primary)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div><div class="s11-ins-text"><strong>汽车制造业</strong>占工业总产值比重超 60%，是十堰经济的核心支柱；第二产业仍居主导，但第三产业比重逐年攀升。</div></div><div class="s11-divider"></div><div class="s11-insight"><div class="s11-ins-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="none"><path d="M3 17l6-6 4 4 8-8" stroke="var(--color-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="21" cy="7" r="2.5" fill="var(--color-accent)" opacity=".3"/></svg></div><div class="s11-ins-text"><strong>文旅产业</strong>年均增速超 12%，武当山景区年接待游客突破千万人次，文化消费升级对公共文化设施品质提出更高要求。</div></div></div></div>
