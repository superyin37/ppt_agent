<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #2C3E2D;
  --color-secondary:      #5A7A6B;
  --color-accent:         #C4854C;
  --color-bg:             #F4F2EE;
  --color-surface:        #EAE7E1;
  --color-text-primary:   #1E1E1E;
  --color-text-secondary: #6B6B6B;
  --color-border:         #D1CCC4;
  --color-overlay:        rgba(44,62,45,0.72);
  --color-cover-bg:       linear-gradient(155deg, #2C3E2D 0%, #3D5A47 40%, #5A7A6B 100%);

  /* ── 字体系统 ── */
  --font-heading: "方正兰亭黑", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "DM Sans", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 51px;
  --text-h1:      38px;
  --text-h2:      28px;
  --text-h3:      21px;
  --text-body:    16px;
  --text-caption: 12px;
  --text-label:   9px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.75;
  --line-height-heading: 1.25;
  --letter-spacing-label:0.08em;

  /* ── 空间系统 ── */
  --safe-margin:   64px;
  --section-gap:   48px;
  --element-gap:   20px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 4px;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>

secondary);margin-top:6px;letter-spacing:1px;}.s15-thumbs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}.s15-thumb{border-radius:var(--border-radius);overflow:hidden;position:relative;height:120px;box-shadow:0 2px 8px rgba(0,0,0,.1);}.s15-thumb img{width:100%;height:100%;object-fit:cover;display:block;}.s15-thumb .cap{position:absolute;bottom:0;left:0;width:100%;padding:4px 8px;background:var(--color-overlay);color:#fff;font-size:var(--text-caption);box-sizing:border-box;text-align:center;}.s15-deco-arc{position:absolute;bottom:0;left:1200px;z-index:1;opacity:.1;}</style><div class="s15-header"><span class="sec-label">Site Analysis</span><span class="sec-title">场地四至与边界</span></div><div class="s15-main-map"><img src="file:///D:/projects/PPT_Agent/test_material/project1/%E5%9C%BA%E5%9C%B0%E5%9B%9B%E8%87%B3%E5%88%86%E6%9E%90_285.png" alt="场地四至分析图"></div><div class="s15-map-overlay"></div><svg class="s15-deco-arc" width="360" height="360" viewBox="0 0 360 360"><circle cx="180" cy="360" r="300" fill="none" stroke="var(--color-accent)" stroke-width="1.5"/><circle cx="180" cy="360" r="220" fill="none" stroke="var(--color-primary)" stroke-width="1"/></svg><div class="s15-panel"><div class="s15-card"><h3 class="s15-card-title">四至关系</h3><p><strong>东侧</strong>：紧邻城市次干道，道路红线退距约8m，沿街界面开敞<br><strong>南侧</strong>：面向城市公共绿地，景观视野良好<br><strong>西侧</strong>：与既有居住组团相邻，需控制建筑高度与视线干扰<br><strong>北侧</strong>：接驳内部支路，便于后勤与货运组织</p></div><div class="s15-kpi-row"><div class="s15-kpi"><div class="num">300</div><div class="unit">m²</div><div class="label">用地面积</div></div><div class="s15-kpi"><div class="num">1.0</div><div class="unit"></div><div class="label">容积率</div></div></div><div class="s15-card"><h3 class="s15-card-title">建设条件概述</h3><p>场地位于十堰市核心文化区，总用地面积300m²，容积率上限1.0，最大可建建筑面积300m²。周边交通便捷，公共交通覆盖率高，具备良好的可达性与城市界面条件。</p></div><div class="s15-thumbs"><div class="s15-thumb"><img src="file:///D:/projects/PPT_Agent/test_material/project1/%E5%A4%96%E9%83%A8%E4%BA%A4%E9%80%9A_285.png" alt="外部交
