<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #2C3E2D;
  --color-secondary:      #5A7A6B;
  --color-accent:         #C4854C;
  --color-bg:             #F4F2EE;
  --color-surface:        #EAE7E1;
  --color-text-primary:   #1E1E1E;
  --color-text-secondary: #6B6B6B;
  --color-border:         #D1CCC4;
  --color-overlay:        rgba(44,62,45,0.72);
  --color-cover-bg:       linear-gradient(155deg, #2C3E2D 0%, #3D5A47 40%, #5A7A6B 100%);

  /* ── 字体系统 ── */
  --font-heading: "方正兰亭黑", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "DM Sans", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 51px;
  --text-h1:      38px;
  --text-h2:      28px;
  --text-h3:      21px;
  --text-body:    16px;
  --text-caption: 12px;
  --text-label:   9px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.75;
  --line-height-heading: 1.25;
  --letter-spacing-label:0.08em;

  /* ── 空间系统 ── */
  --safe-margin:   64px;
  --section-gap:   48px;
  --element-gap:   20px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 4px;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>

eft:var(--safe-margin);font-family:var(--font-en);font-size:var(--text-caption);color:var(--color-text-secondary);opacity:0.5;letter-spacing:2px;z-index:5}.s31-num{position:absolute;top:var(--safe-margin);right:var(--safe-margin);font-family:var(--font-en);font-size:var(--text-caption);color:var(--color-text-secondary);opacity:0.45;z-index:5}</style><div class="s31-left"><span class="s31-label">Concept Scheme</span><span class="s31-scheme">方案二 / SCHEME B</span><h1 class="s31-title">武当<em>叠岩</em></h1><p class="s31-concept">以武当山水意象为设计主导，层叠覆土屋面模拟山峦起伏，石材基座扎根大地，绿植覆盖消融建筑边界，雨水收集灌溉系统实现生态自循环——建筑即山水，山水即建筑。</p><div class="s31-tags"><span class="s31-tag">覆土屋面</span><span class="s31-tag">石材基座</span><span class="s31-tag">雨水收集</span><span class="s31-tag">绿植覆盖</span><span class="s31-tag">山水意象</span></div></div><div class="s31-divider"></div><div class="s31-right"><div class="s31-grid"></div><svg width="100%" height="100%" viewBox="0 0 960 1080" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="s31g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--color-bg)" stop-opacity="1"/><stop offset="35%" stop-color="var(--color-bg)" stop-opacity="0"/></linearGradient><linearGradient id="s31g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--color-primary)" stop-opacity="0.18"/><stop offset="100%" stop-color="var(--color-primary)" stop-opacity="0.45"/></linearGradient><linearGradient id="s31g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--color-secondary)" stop-opacity="0.12"/><stop offset="100%" stop-color="var(--color-secondary)" stop-opacity="0.35"/></linearGradient><linearGradient id="s31g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--color-accent)" stop-opacity="0.08"/><stop offset="100%" stop-color="var(--color-accent)" stop-opacity="0.22"/></linearGradient><pattern id="s31noise" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="1" height="1" x="0" y="0" fill="var(--color-text-primary)" opacity="0.03"/><rect width="1" height="1" x="2" y="2" fill="var(--color-text-primary)" opacity="0.02"/></pattern></defs><rect width="960" height="1080" fill="url(#s31noise)"/><path d="M0 680 Q120 520 240 560 Q360 480 420 420 Q500 340 560 380 Q640 320 720 360 Q820 300 960 350 L960 1080 L0 1080Z" fill="url(#s31g4)" opacity="0.6"/><path d="M0 720 Q100 600 200 640 Q320 540 400 500 Q480 430 560 470 Q660 400 760 440 Q860 380 960 420 L960 1080 L0 1080Z" fill="url(#s31g3)"/><path d="M0 780 Q140 660 260 700 Q380 620 460 580 Q540 520 620 560 Q720 490 820 530 Q900 480 960 500 L960 1080 L0 1080Z" fill="url(#s31g2)"/><path d="M0 860 Q160 780 300 800 Q420 740 500 720 Q580 680 660 710 Q760 660 860 690 Q920 670 960 680 L960 1080 L0 1080Z" fill="var(--color-primary)" opacity="0.55"/><g opacity="0.3" stroke="var(--color-surface)" stroke-width="1" fill="none"><line x1="200" y1="800" x2="200" y2="1080"/><line x1="200" y1="800" x2="360" y2="800"/><line x1="360" y1="800" x2="360" y2="920"/><line x1="360" y1="920" x2="520" y2="920"/><line x1="520" y1="800" x2="520" y2="1000"/><line x1="520" y1="800" x2="680" y2="800"/><rect x="200" y="800" width="160" height="120" rx="2"/><rect x="520" y="800" width="160" height="200" rx="2"/></g><g opacity="0.18" fill="var(--color-primary)"><circle cx="200" cy="640" r="3"/><circle cx="400" cy="500" r="3"/><circle cx="560" cy="470" r="3"/><circle cx="720" cy="440" r="3"/><circle cx="860" cy="530" r="3"/></g><g opacity="0.12" stroke="var(--color-accent)" stroke-width="0.8" fill="none" stroke-dasharray="6 4"><path d="M80 950 Q200 900 340 920 Q480 880 600 900 Q740 860 900 890"/><text x="910" y="888" font-size="11" fill="var(--color-accent)" opacity="0.5" font-family="var(--font-en)">rainwater flow</text></g><text x="480" y="1050" text-anchor="middle" font-family="var(--font-en)" font-size="13" fill="var(--color-text-secondary)" opacity="0.35" letter-spacing="3">WUDANG STACKED ROCK · CONCEPT SKETCH</text><rect width="960" heig
