<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #2C3E2D;
  --color-secondary:      #5A7A6B;
  --color-accent:         #C4854C;
  --color-bg:             #F4F2EE;
  --color-surface:        #EAE7E1;
  --color-text-primary:   #1E1E1E;
  --color-text-secondary: #6B6B6B;
  --color-border:         #D1CCC4;
  --color-overlay:        rgba(44,62,45,0.72);
  --color-cover-bg:       linear-gradient(155deg, #2C3E2D 0%, #3D5A47 40%, #5A7A6B 100%);

  /* ── 字体系统 ── */
  --font-heading: "方正兰亭黑", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "DM Sans", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 51px;
  --text-h1:      38px;
  --text-h2:      28px;
  --text-h3:      21px;
  --text-body:    16px;
  --text-caption: 12px;
  --text-label:   9px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.75;
  --line-height-heading: 1.25;
  --letter-spacing-label:0.08em;

  /* ── 空间系统 ── */
  --safe-margin:   64px;
  --section-gap:   48px;
  --element-gap:   20px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 4px;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>

<div class="slide-root"><style>.slide-root{background:var(--color-bg);font-family:var(--font-body);overflow:hidden}.sr-grid{display:grid;grid-template-columns:42% 58%;height:100%;position:relative;z-index:2}.sr-left{display:flex;flex-direction:column;justify-content:center;padding:calc(var(--safe-margin)*1.5);padding-right:calc(var(--safe-margin)*0.8);position:relative}.sr-right{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--color-surface)}.sr-label{font-family:var(--font-en);font-size:var(--text-label);color:var(--color-accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:12px;font-weight:600}.sr-scheme-no{font-family:var(--font-en);font-size:13px;color:var(--color-text-secondary);letter-spacing:6px;text-transform:uppercase;margin-bottom:20px;opacity:.6}.sr-title{font-family:var(--font-heading);font-size:56px;font-weight:800;color:var(--color-text-primary);line-height:1.2;margin-bottom:8px;letter-spacing:2px}.sr-title-en{font-family:var(--font-en);font-size:var(--text-h3);color:var(--color-text-secondary);font-weight:300;font-style:italic;margin-bottom:36px;opacity:.55;letter-spacing:1px}.sr-divider{width:64px;height:3px;background:var(--color-accent);margin-bottom:32px;border-radius:2px}.sr-desc{font-size:var(--text-body);color:var(--color-text-primary);line-height:1.9;margin-bottom:32px;max-width:520px}.sr-tags{display:flex;gap:10px;flex-wrap:wrap}.sr-tag{font-size:var(--text-caption);color:var(--color-primary);border:1.5px solid var(--color-primary);border-radius:20px;padding:5px 16px;font-family:var(--font-body);letter-spacing:1px;background:transparent}.sr-sketch-area{width:88%;height:78%;border:1.5px dashed var(--color-border);border-radius:var(--border-radius);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}.sr-sketch-label{font-family:var(--font-en);font-size:var(--text-caption);color:var(--color-text-secondary);opacity:.45;letter-spacing:3px;margin-top:16px;text-transform:uppercase}.sr-kw{position:absolute;bottom:calc(var(--safe-margin));right:calc(var(--safe-margin));font-family:var(--font-en);font-size:11px;color:var(--color-text-secondary);opacity:.3;letter-spacing:5px;text-transform:uppercase}</style><div class="sr-grid"><div class="sr-left"><span class="sr-scheme-no">Scheme 01</span><span class="sr-label">概念方案</span><h1 class="sr-title">钢铁流云</h1><span class="sr-title-en">Steel Flowing Cloud</span><div class="sr-divider"></div><p class="sr-desc">以十堰车城工业美学为设计主导，折板金属屋面模拟汽车流线动感，外立面采用耐候钢与穿孔铝板双层表皮，兼顾遮阳与光影变化；内部设置自然通风烟囱，以被动式策略回应生态诉求，让建筑在工业力量与自然呼吸之间达成平衡。</p><div class="sr-tags"><span class="sr-tag">折板金属屋面</span><span class="sr-tag">耐候钢立面</span><span class="sr-tag">穿孔铝板</span><span class="sr-tag">自然通风烟囱</span></div></div><div class="sr-right"><svg style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:.06" viewBox="0 0 800 600"><defs><pattern id="grid-dot" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="var(--color-text-secondary)"/></pattern></defs><rect width="800" height="600" fill="url(#grid-dot)"/></svg><div class="sr-sketch-area"><svg width="420" height="260" viewBox="0 0 420 260" fill="none"><defs><linearGradient id="steel-g" x1="0" y1="0" x2="420" y2="260" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="var(--color-primary)" stop-opacity=".25"/><stop offset="100%" stop-color="var(--color-accent)" stop-opacity=".12"/></linearGradient></defs><path d="M20 220 L20 140 L80 100 L160 120 L210 80 L280 95 L340 60 L400 90 L400 220 Z" fill="url(#steel-g)" stroke="var(--color-primary)" stroke-width="1.5"/><path d="M20 140 L80 100 L160 120 L210 80 L280 95 L340 60 L400 90" fill="none" stroke="var(--color-accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="80" y1="100" x2="80" y2="220" stroke="var(--color-border)" stroke-width="1" stroke-dasharray="4 3"/><line x1="160" y1="120" x2="160" y2="220" stroke="var(--color-border)" stroke-width="1" stroke-dasharray="4 3"/><line x1="210" y1="80" x2="210" y2="220" stroke="var(--color-border)" stroke-width="1" stroke-dasharray="4 3"/><line x1="280" y1="95" x2="280" y2="220" stroke="var(--color-border)" stroke-width="1" stroke-dasharray="4 3"/><line x1="340" y1="60" x2="340" y2="220" stroke="var(--color-border)" stroke-width="1" stroke-dasharray="4 3"/><line x1="10" y1="220" x2="410" y2="220" stroke="var(--color-text-secondary)" stroke-width="1.5"/><rect x="75" y="150" width="10" height="70" rx="1" fill="var(--color-primary)" opacity=".18"/><rect x="155" y="160" width="10" height="60" rx="1" fill="var(--color-primary)" opacity=".18"/><rect x="275" y="145" width="10" height="75" rx="1" fill="var(--color-primary)" opacity=".18"/><circle cx="210" cy="170" r="18" fill="none" stroke="var(--color-accent)" stroke-width="1.2" stroke-dasharray="3 2" opacity=".5"/><path d="M204 170 L210 158 L216 170" fill="none" stroke="var(--color-accent)" stroke-width="1" opacity=".5"/><text x="210" y="196" text-anchor="middle" font-size="9" fill="var(--color-text-secondary)" opacity=".6" font-family="var(--font-en)">ventilation chimney</text><text x="340" y="52" text-anchor="middle" font-size="9" fill="var(--color-accent)" opacity=".7" font-family="var(--font-en)">folded metal roof</text></svg><span class="sr-sketch-label">Concept Sketch · 概念草图</span></div></div></div><svg style="position:absolute;top:-80px;left:-80px;width:320px;height:320px;opacity:.08;z-index:1" viewBox="0 0 320 320"><circle cx="160" cy="160" r="140" fill="none" stroke="var(--color-accent)" stroke-width="1.5"/><circle cx="160" cy="160" r="100" fill="none" stroke="var(--color-accent)" stroke-width="1"/></svg><span class="sr-kw">Industrial Aesthetics · Shiyan</span></div>
