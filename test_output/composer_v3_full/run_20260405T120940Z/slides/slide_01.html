<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #2C3E2D;
  --color-secondary:      #5A7A6B;
  --color-accent:         #C4854C;
  --color-bg:             #F4F2EE;
  --color-surface:        #EAE7E1;
  --color-text-primary:   #1E1E1E;
  --color-text-secondary: #6B6B6B;
  --color-border:         #D1CCC4;
  --color-overlay:        rgba(44,62,45,0.72);
  --color-cover-bg:       linear-gradient(155deg, #2C3E2D 0%, #3D5A47 40%, #5A7A6B 100%);

  /* ── 字体系统 ── */
  --font-heading: "方正兰亭黑", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "DM Sans", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 51px;
  --text-h1:      38px;
  --text-h2:      28px;
  --text-h3:      21px;
  --text-body:    16px;
  --text-caption: 12px;
  --text-label:   9px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.75;
  --line-height-heading: 1.25;
  --letter-spacing-label:0.08em;

  /* ── 空间系统 ── */
  --safe-margin:   64px;
  --section-gap:   48px;
  --element-gap:   20px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 4px;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>
<body>
<div class="slide-root"><style>.slide-root{background:var(--color-cover-bg);font-family:var(--font-body);overflow:hidden}.cover-bg{position:absolute;inset:0;z-index:0}.mountain-svg{position:absolute;bottom:0;left:0;width:100%;height:600px;z-index:1}.noise-overlay{position:absolute;inset:0;z-index:2;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.5'/%3E%3C/svg%3E");background-size:128px 128px}.content-layer{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;justify-content:center;padding-left:calc(var(--safe-margin)*2.5);padding-right:var(--safe-margin)}.top-bar{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--color-primary),var(--color-accent),transparent);z-index:20}.label-tag{display:inline-block;font-family:var(--font-en);font-size:var(--text-label);color:var(--color-accent);letter-spacing:4px;text-transform:uppercase;border:1px solid var(--color-accent);padding:6px 18px;margin-bottom:32px;border-radius:2px}.main-title{font-family:var(--font-heading);font-size:var(--text-display);color:var(--color-text-primary);line-height:1.2;margin:0 0 12px 0;letter-spacing:4px;font-weight:700}.sub-line{font-family:var(--font-heading);font-size:var(--text-h2);color:var(--color-text-secondary);margin:0 0 40px 0;letter-spacing:2px;font-weight:400;line-height:1.6}.concept-badge{display:inline-flex;align-items:center;gap:12px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--border-radius);padding:10px 24px;margin-bottom:48px;font-size:var(--text-body);color:var(--color-text-primary)}.concept-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--color-accent);flex-shrink:0}.concept-badge .sep{color:var(--color-border);margin:0 4px}.bottom-info{display:flex;align-items:center;gap:40px;font-size:var(--text-caption);color:var(--color-text-secondary);letter-spacing:1px}.bottom-info .divider{width:1px;height:16px;background:var(--color-border)}.geo-deco{position:absolute;top:80px;right:100px;z-index:5;opacity:.12}.grid-dots{position:absolute;bottom:120px;right:140px;z-index:5;opacity:.08}.vert-line{position:absolute;left:calc(var(--safe-margin)*1.5);top:15%;bottom:15%;width:1px;background:linear-gradient(180deg,transparent,var(--color-border),transparent);z-index:5}</style><div class="cover-bg"></div><div class="noise-overlay"></div><svg class="mountain-svg" viewBox="0 0 1920 600" preserveAspectRatio="none"><defs><linearGradient id="mg1" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="var(--color-primary)" stop-opacity=".12"/><stop offset="100%" stop-color="var(--color-primary)" stop-opacity="0"/></linearGradient><linearGradient id="mg2" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="var(--color-accent)" stop-opacity=".08"/><stop offset="100%" stop-color="var(--color-accent)" stop-opacity="0"/></linearGradient></defs><path d="M0 600 L0 380 Q200 280 400 340 Q550 200 720 260 Q850 160 960 220 Q1100 120 1250 200 Q1400 100 1520 180 Q1650 80 1780 160 Q1860 120 1920 150 L1920 600Z" fill="url(#mg1)"/><path d="M0 600 L0 440 Q300 360 550 400 Q700 320 900 370 Q1050 290 1200 340 Q1400 260 1600 320 Q1780 270 1920 300 L1920 600Z" fill="url(#mg2)"/><line x1="0" y1="520" x2="1920" y2="520" stroke="var(--color-border)" stroke-width=".5" stroke-dasharray="8 12" opacity=".3"/></svg><svg class="geo-deco" width="320" height="320" viewBox="0 0 320 320"><circle cx="160" cy="160" r="150" fill="none" stroke="var(--color-primary)" stroke-width="1.5"/><circle cx="160" cy="160" r="110" fill="none" stroke="var(--color-accent)" stroke-width="1"/><circle cx="160" cy="160" r="70" fill="none" stroke="var(--color-primary)" stroke-width=".5"/><line x1="160" y1="0" x2="160" y2="320" stroke="var(--color-border)" stroke-width=".5"/><line x1="0" y1="160" x2="320" y2="160" stroke="var(--color-border)" stroke-width=".5"/></svg><svg class="grid-dots" width="200" height="200" viewBox="0 0 200 200"><defs><pattern id="dotgrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill="var(--color-primary)"/></pattern></defs><rect width="200" height="200" fill="url(#dotgrid)"/></svg><div class="vert-line"></div><div class="top-bar"></div><div class="content-layer"><span class="label-tag">Architectural Design Report</span><h1 class="main-title">十堰市张湾区<br>人民广场公共厕所</h1><p class="sub-line">建筑方案汇报</p><div class="concept-badge"><span class="dot"></span><span>车城工业美学</span><span class="sep">×</span><span>武当山水意象</span><span class="sep">·</span><span>300m² 生态示范公厕</span></div><div class="bottom-info"><span>委托方：Material Package E2C</span><div class="divider"></div><span>项目地点：湖北省十堰市张湾区人民广场</span><div class="divider"></div><span>2025年</span></div></div></div>
