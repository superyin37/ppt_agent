<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #2C3E2D;
  --color-secondary:      #5A7D6B;
  --color-accent:         #C8A45C;
  --color-bg:             #F4F2ED;
  --color-surface:        #EAE7E0;
  --color-text-primary:   #1E2A1F;
  --color-text-secondary: #6B7B6E;
  --color-border:         #D1CCC3;
  --color-overlay:        rgba(44,62,45,0.72);
  --color-cover-bg:       linear-gradient(155deg, #1E2A1F 0%, #2C3E2D 40%, #3D5A42 100%);

  /* ── 字体系统 ── */
  --font-heading: "方正兰亭黑", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "DM Sans", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 51px;
  --text-h1:      38px;
  --text-h2:      28px;
  --text-h3:      21px;
  --text-body:    16px;
  --text-caption: 12px;
  --text-label:   9px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.75;
  --line-height-heading: 1.25;
  --letter-spacing-label:0.08em;

  /* ── 空间系统 ── */
  --safe-margin:   64px;
  --section-gap:   48px;
  --element-gap:   20px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 4px;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>

olor="#c49a4e" stop-opacity="0"/></linearGradient><pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M60 0L0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.5"/></pattern></defs><rect width="1920" height="1080" fill="url(#bg1)"/><rect width="1920" height="1080" fill="url(#grid)"/><!-- 大弧线装饰 --><circle cx="1600" cy="900" r="680" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1.5"/><circle cx="1600" cy="900" r="520" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/><circle cx="1600" cy="900" r="360" fill="none" stroke="rgba(255,255,255,0.018)" stroke-width="0.8"/><!-- 左上角几何 --><line x1="80" y1="60" x2="80" y2="320" stroke="rgba(255,255,255,0.06)" stroke-width="1"/><line x1="80" y1="60" x2="340" y2="60" stroke="rgba(255,255,255,0.06)" stroke-width="1"/><!-- 右上角建筑轮廓线 --><g opacity="0.06" stroke="#fff" stroke-width="1" fill="none" transform="translate(1200,80)"><path d="M0 300 L0 120 L80 80 L80 300"/><path d="M100 300 L100 160 L200 160 L200 300"/><path d="M220 300 L220 100 L280 70 L340 100 L340 300"/><path d="M360 300 L360 180 L440 140 L440 300"/><path d="M460 300 L460 200 L560 200 L560 300"/><line x1="-40" y1="300" x2="600" y2="300"/></g><!-- 金赭光晕 --><ellipse cx="200" cy="900" rx="500" ry="300" fill="url(#glow1)"/><!-- 竖向细线装饰 --><line x1="1760" y1="0" x2="1760" y2="1080" stroke="rgba(255,255,255,0.03)" stroke-width="1"/><line x1="1800" y1="0" x2="1800" y2="1080" stroke="rgba(255,255,255,0.02)" stroke-width="1"/></svg><!-- 内容区 --><div class="cover-content"><div class="tag-row" style="margin-bottom:36px"><span class="tag">被动节能</span><span class="tag">车城文化</span><span class="tag">武当意蕴</span><span class="tag">生态公厕</span></div><div class="title-block"><h1 class="main-title">十堰市张湾区人民广场<br>公共厕所建筑方案</h1><p class="sub-title">被动节能 · 车城武当双文化</p></div><div class="divider-line"></div><div class="meta-row"><span class="meta-item">委托方　Material Package E2C</span><span class="meta-item">项目地点　湖北省十堰市张湾区</span><span class="meta-item">2025</span></div></div></div>
