<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
:root {
  /* ── 色彩系统 ── */
  --color-primary:        #3A4740;
  --color-secondary:      #8C9990;
  --color-accent:         #C26D4A;
  --color-bg:             #F5F6F4;
  --color-surface:        #FFFFFF;
  --color-text-primary:   #1A1F1C;
  --color-text-secondary: #5C6661;
  --color-border:         #D1D6D3;
  --color-overlay:        rgba(26, 31, 28, 0.65);
  --color-cover-bg:       linear-gradient(135deg, #293630 0%, #4B5A52 100%);

  /* ── 字体系统 ── */
  --font-heading: "思源黑体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-body:    "思源宋体", "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-en:      "Inter", "Helvetica Neue", Arial, sans-serif;

  /* ── 字阶 ── */
  --text-display: 56px;
  --text-h1:      40px;
  --text-h2:      28px;
  --text-h3:      20px;
  --text-body:    14px;
  --text-caption: 10px;
  --text-label:   7px;

  /* ── 字重 / 行高 ── */
  --font-weight-heading: 700;
  --font-weight-body:    400;
  --line-height-body:    1.6;
  --line-height-heading: 1.2;
  --letter-spacing-label:0.05em;

  /* ── 空间系统 ── */
  --safe-margin:   48px;
  --section-gap:   32px;
  --element-gap:   16px;
  --base-unit:     8px;

  /* ── 装饰 ── */
  --border-radius: 0;

  /* ── 幻灯片尺寸 ── */
  --slide-width:  1920px;
  --slide-height: 1080px;
}

/* ── 全局 Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: var(--slide-width);
  height: var(--slide-height);
  overflow: hidden;
  background-color: var(--color-bg);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: var(--color-text-primary);
  font-family: var(--font-body);
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  font-weight: var(--font-weight-body);
}

img { display: block; width: 100%; height: 100%; object-fit: cover; }

.slide-root {
  width: var(--slide-width);
  height: var(--slide-height);
  position: relative;
  overflow: hidden;
}

/* ── 通用内容块样式 ── */
.block-heading {
  font-family: var(--font-heading);
  font-size: var(--text-h1);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-subheading {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-weight: var(--font-weight-heading);
  line-height: var(--line-height-heading);
  color: var(--color-text-primary);
}
.block-body-text {
  font-size: var(--text-body);
  line-height: var(--line-height-body);
  color: var(--color-text-primary);
}
.block-bullet-list { list-style: none; }
.block-bullet-list li { padding: 6px 0; padding-left: 1.2em; position: relative; }
.block-bullet-list li::before {
  content: "";
  position: absolute;
  left: 0; top: 0.65em;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--color-accent);
}
.block-kpi-value {
  font-family: var(--font-en);
  font-size: var(--text-display);
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
}
.block-caption {
  font-size: var(--text-caption);
  color: var(--color-text-secondary);
  line-height: 1.4;
}
.block-label {
  font-family: var(--font-en);
  font-size: var(--text-label);
  letter-spacing: var(--letter-spacing-label);
  text-transform: uppercase;
  color: var(--color-text-secondary);
}
.block-quote {
  font-family: var(--font-heading);
  font-size: var(--text-h2);
  font-style: italic;
  color: var(--color-primary);
  border-left: 4px solid var(--color-accent);
  padding-left: 1em;
}

/* emphasis 修饰 */
.emphasis-highlight { color: var(--color-accent); }
.emphasis-muted { color: var(--color-text-secondary); opacity: 0.7; }

/* ── 分隔线 ── */
.divider-hairline { border: none; border-top: 0.5px solid var(--color-border); }
.divider-thin     { border: none; border-top: 1px solid var(--color-border); }
.divider-medium   { border: none; border-top: 2px solid var(--color-accent); }

/* ── 表面色背景 ── */
.surface-bg { background-color: var(--color-surface); }
.primary-bg { background-color: var(--color-primary); color: #fff; }
.accent-bg  { background-color: var(--color-accent); color: #fff; }

</style>
</head>
<body>
<div class="slide-root" style="background-color: var(--color-primary); color: #ffffff; display: flex; align-items: center; padding: var(--safe-margin); box-sizing: border-box;">
  <style>
    .chapter-divider-container {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 10;
    }
    .chapter-left {
      flex: 0 0 320px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      border-right: 2px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 80px;
      padding-right: 40px;
    }
    .chapter-num {
      font-family: var(--font-en);
      font-size: 220px;
      font-weight: 300;
      line-height: 0.8;
      letter-spacing: -5px;
      color: #ffffff;
      text-align: right;
    }
    .chapter-label {
      font-family: var(--font-en);
      font-size: var(--text-h3);
      color: var(--color-accent, rgba(255, 255, 255, 0.6));
      margin-top: 30px;
      letter-spacing: 8px;
      text-align: right;
    }
    .chapter-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 140px;
    }
    .chapter-title {
      font-family: var(--font-heading);
      font-size: 140px;
      font-weight: 700;
      margin: 0;
      letter-spacing: 15px;
      color: #ffffff;
      line-height: 1.1;
    }
    .chapter-subtitle {
      font-family: var(--font-en);
      font-size: var(--text-h2);
      font-weight: 300;
      letter-spacing: 24px;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
    }
    .chapter-line {
      margin-top: 80px;
      width: 120px;
      height: 6px;
      background-color: var(--color-accent, #ffffff);
    }
    .chapter-desc {
      font-family: var(--font-body);
      font-size: var(--text-h3);
      color: rgba(255, 255, 255, 0.8);
      margin-top: 50px;
      max-width: 850px;
      line-height: 1.8;
      font-weight: 300;
    }
  </style>

  <!-- SVG Background Decoration: Industrial & Ecological geometric lines -->
  <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.15; pointer-events: none;" viewBox="0 0 1920 1080">
    <defs>
      <pattern id="industrial-grid" width="60" height="60" patternUnits="userSpaceOnUse">
        <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5"/>
        <circle cx="0" cy="0" r="1.5" fill="#ffffff"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#industrial-grid)" />
    <!-- Right-angle staggered lines -->
    <path d="M 1400 0 L 1400 850 L 1920 850" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M 0 250 L 450 250 L 450 1080" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M 1400 850 L 1400 1080" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="10,10"/>
    <path d="M 450 0 L 450 250" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="10,10"/>
  </svg>

  <div class="chapter-divider-container">
    <div class="chapter-left">
      <div class="chapter-num">04</div>
      <div class="chapter-label">CHAPTER</div>
    </div>

    <div class="chapter-right">
      <h1 class="chapter-title">设计策略</h1>
      <div class="chapter-subtitle">Design Strategy</div>
      <div class="chapter-line"></div>
      <p class="chapter-desc">
        将前期研究转化为具体的空间形态、材质选择与生态技术落地指引。通过现代简约的直角线条与错落排版，打造工业冷峻与自然生态交融的文化建筑空间，强调通透感与灰空间体验。
      </p>
    </div>
  </div>
</div>

<div style="position:absolute;bottom:20px;left:var(--safe-margin);right:var(--safe-margin);
display:flex;justify-content:space-between;font-size:var(--text-caption);
color:var(--color-text-secondary);opacity:0.6;">
  <span>十堰市张湾区人民广场公共驿站设计建议书</span>
  <span>28 / 41</span>
</div>
</body>
</html>
